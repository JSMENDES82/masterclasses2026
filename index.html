<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterclasses 2026 - Salesianos Porto</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #330066; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #video-container, #image-container { width: 100%; height: 100%; display: none; }
        iframe, img { width: 100%; height: 100%; border: none; object-fit: contain; }
    </style>
</head>
<body>
    <div id="video-container" style="display: block;">
        <iframe id="player" src="https://www.youtube.com/embed/aa_Fn-8dhHE?autoplay=1&controls=0&rel=0&enablejsapi=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <div id="image-container">
        <img src="https://i.ibb.co/L5YwN3p/1000085474.jpg" alt="Cartaz Masterclasses">
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                events: { 'onStateChange': function(event) {
                    if (event.data == YT.PlayerState.ENDED) {
                        document.getElementById('video-container').style.display = 'none';
                        document.getElementById('image-container').style.display = 'block';
                    }
                }}
            });
        }
    </script>
</body>
</html>
